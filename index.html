<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>選手資料輸入</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #eef2f5;
      --text: #1d2730;
      --muted: #617080;
      --line: #d8e0e7;
      --accent: #16785f;
      --accent-strong: #0f604b;
      --danger: #b64242;
      --focus: #2b87d3;
      --shadow: 0 10px 24px rgba(24, 38, 53, 0.08);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 12px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
    }

    button:hover { border-color: #bac7d1; }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .tabs,
    .top-actions,
    .mode-control,
    .output-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tabs {
      padding: 3px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .tab-button {
      min-height: 32px;
      background: transparent;
      border-color: transparent;
    }

    .tab-button[aria-selected="true"] {
      background: white;
      border-color: #c8d3dc;
      box-shadow: 0 1px 3px rgba(24, 38, 53, 0.08);
    }

    .mode-control {
      gap: 6px;
    }

    .mode-control label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    select {
      min-height: 36px;
      border: 1px solid #c8d3dc;
      border-radius: 6px;
      background: white;
      color: var(--text);
      padding: 0 32px 0 10px;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .danger { color: var(--danger); }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 0.42fr);
      gap: 18px;
      padding: 18px;
      align-items: start;
    }

    .sheet,
    .output {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sheet-header,
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .sheet-tools {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 132px);
    }

    table {
      width: 100%;
      min-width: var(--table-min-width, 1510px);
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f7f9fb;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-align: left;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: 0; }

    .w-name { width: 104px; }
    .w-pos { width: 124px; }
    .w-team { width: 94px; }
    .w-series { width: 112px; }
    .w-num { width: 84px; }
    .w-grade { width: 82px; }
    .w-note { width: 96px; }
    .w-stat-small { width: 72px; }
    .w-slash { width: 132px; }
    .w-pitch { width: 130px; }
    .w-extra { width: 150px; }
    .w-actions { width: 116px; }

    .metadata-folded table { min-width: 1120px; }
    .metadata-folded .metadata-col { display: none; }

    input,
    textarea {
      width: 100%;
      border: 1px solid #c8d3dc;
      border-radius: 6px;
      background: white;
      color: var(--text);
      padding: 7px 8px;
      min-height: 34px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.35;
    }

    input::placeholder,
    textarea::placeholder {
      color: #98a5b1;
    }

    .compact-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .icon-btn {
      min-width: 36px;
      padding: 0;
      font-size: 15px;
      line-height: 1;
    }

    .output {
      position: sticky;
      top: 76px;
    }

    .output textarea {
      display: block;
      min-height: calc(100vh - 182px);
      border: 0;
      border-radius: 0;
      resize: none;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre;
    }

    .status {
      min-height: 18px;
      padding: 0 14px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .topbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .output { position: static; }
      .output textarea { min-height: 360px; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>選手資料輸入</h1>
      <div class="tabs" role="tablist" aria-label="選手類型">
        <button type="button" class="tab-button" id="hittersTab" role="tab" aria-selected="true" data-sheet="hitters">打者</button>
        <button type="button" class="tab-button" id="pitchersTab" role="tab" aria-selected="false" data-sheet="pitchers">投手</button>
      </div>
      <div class="top-actions">
        <div class="mode-control">
          <label for="modeSelect">模式</label>
          <select id="modeSelect">
            <option value="pawapuro">Pawapuro</option>
            <option value="prospi">Prospi</option>
          </select>
        </div>
        <button type="button" id="addPlayer" class="primary">新增選手</button>
        <button type="button" id="copyJson">複製 JSON</button>
        <button type="button" id="downloadJson">下載 JSON</button>
        <button type="button" id="importJson">匯入 JSON</button>
        <input type="file" id="jsonFile" accept="application/json,.json" hidden>
        <button type="button" id="resetSample">重設範例</button>
      </div>
    </header>

    <section class="workspace" aria-label="選手資料工作區">
      <div class="sheet">
        <div class="sheet-header">
          <strong id="sheetTitle">資料表</strong>
          <div class="sheet-tools">
            <button type="button" id="toggleMetadata" aria-pressed="false">收合資料</button>
            <span class="count" id="playerCount"></span>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr id="headerRow"></tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>

      <aside class="output" aria-label="JSON 輸出">
        <div class="output-header">
          <strong>輸出 JSON</strong>
          <div class="output-actions">
            <button type="button" id="copyJsonSide">複製</button>
          </div>
        </div>
        <textarea id="outputText" spellcheck="false" readonly></textarea>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </aside>
    </section>
  </main>

  <script>
    const MODE_STORAGE_KEYS = {
      pawapuro: "game-stat-pawapuro-json-v1",
      prospi: "game-stat-prospi-json-v1"
    };
    const MODE_DATA_FILES = {
      pawapuro: "data/pawapuro.json",
      prospi: "data/prospi.json"
    };
    const LEGACY_COMBINED_STORAGE_KEY = "game-stat-json-v2";
    const LEGACY_PROSPI_STORAGE_KEYS = {
      hitters: "game-stat-player-sheet-v1",
      pitchers: "game-stat-pitcher-sheet-v1"
    };
    const ACTIVE_MODE_KEY = "game-stat-active-mode-v2";
    const ACTIVE_SHEET_KEY = "game-stat-active-sheet-v2";
    const FOLD_STORAGE_KEY = "game-stat-metadata-folded-v2";
    const SCHEMA_VERSION = 2;

    const rowsEl = document.querySelector("#rows");
    const headerRowEl = document.querySelector("#headerRow");
    const outputEl = document.querySelector("#outputText");
    const countEl = document.querySelector("#playerCount");
    const statusEl = document.querySelector("#status");
    const tableWrapEl = document.querySelector(".table-wrap");
    const metadataButtonEl = document.querySelector("#toggleMetadata");
    const addButtonEl = document.querySelector("#addPlayer");
    const modeSelectEl = document.querySelector("#modeSelect");
    const jsonFileEl = document.querySelector("#jsonFile");
    const sheetTitleEl = document.querySelector("#sheetTitle");
    const tabButtons = [...document.querySelectorAll(".tab-button")];

    const prospiMetadataColumns = [
      { field: "positions", label: "位置", placeholder: "3B/1B/LF", className: "w-pos", metadata: true },
      { field: "team", label: "球隊", placeholder: "火腿", className: "w-team", metadata: true },
      { field: "series", label: "Series", placeholder: "25 S1 EX", className: "w-series", metadata: true },
      { field: "currentSpirit", label: "目前", placeholder: "4900", className: "w-num", metadata: true },
      { field: "trainableSpirit", label: "可練成", placeholder: "5000", className: "w-num", metadata: true },
      { field: "maxSpirit", label: "最高", placeholder: "5200", className: "w-num", metadata: true },
      { field: "grade", label: "評價", placeholder: "SS", className: "w-grade", metadata: true },
      { field: "note", label: "備註", placeholder: "OB", className: "w-note", metadata: true }
    ];

    const pawapuroHitterMetadataColumns = [
      { field: "age", label: "年紀", placeholder: "19", className: "w-stat-small", metadata: true },
      { field: "positions", label: "守備位置", placeholder: "CF=RF=LF", className: "w-pos", metadata: true },
      { field: "contact", label: "打擊", placeholder: "S", className: "w-grade", metadata: true },
      { field: "power", label: "力量", placeholder: "A", className: "w-grade", metadata: true },
      { field: "speed", label: "跑速", placeholder: "A", className: "w-grade", metadata: true },
      { field: "arm", label: "肩力", placeholder: "A", className: "w-grade", metadata: true },
      { field: "fielding", label: "守備判斷", placeholder: "C", className: "w-grade", metadata: true },
      { field: "note", label: "備註", placeholder: "", className: "w-note", metadata: true }
    ];

    const pawapuroPitcherMetadataColumns = [
      { field: "age", label: "年紀", placeholder: "27", className: "w-stat-small", metadata: true },
      { field: "handedness", label: "左右投", placeholder: "RHP", className: "w-grade", metadata: true },
      { field: "velocity", label: "球速", placeholder: "157", className: "w-stat-small", metadata: true },
      { field: "control", label: "控球", placeholder: "C", className: "w-grade", metadata: true },
      { field: "stamina", label: "體力", placeholder: "C", className: "w-grade", metadata: true },
      { field: "primaryPitch", label: "決勝變化球", placeholder: "knucklecurve-3", className: "w-pitch", metadata: true },
      { field: "secondaryPitch", label: "第二變化球", placeholder: "slider-2", className: "w-pitch", metadata: true },
      { field: "note", label: "備註", placeholder: "cl-ok", className: "w-note", metadata: true }
    ];

    const hitterStatColumns = [
      { field: "pa", label: "PA", placeholder: "93", className: "w-stat-small" },
      { field: "slashLine", label: "AVG/OBP/SLG", placeholder: ".407/.409/.615", className: "w-slash" },
      { field: "hr", label: "HR", placeholder: "3", className: "w-stat-small" },
      { field: "rbi", label: "RBI", placeholder: "12", className: "w-stat-small" },
      { field: "sb", label: "SB", placeholder: "3", className: "w-stat-small" },
      { field: "k", label: "K", placeholder: "", className: "w-stat-small" },
      { field: "bb", label: "BB", placeholder: "", className: "w-stat-small" },
      { field: "extraStats", label: "其他成績", placeholder: "", className: "w-extra" }
    ];

    const pitcherStatColumns = [
      { field: "gp", label: "GP", placeholder: "10", className: "w-stat-small" },
      { field: "ip", label: "IP", placeholder: "11.1", className: "w-stat-small" },
      { field: "era", label: "ERA", placeholder: "3.18", className: "w-stat-small" },
      { field: "whip", label: "WHIP", placeholder: "0.88", className: "w-stat-small" },
      { field: "fip", label: "FIP", placeholder: "2.19", className: "w-stat-small" },
      { field: "k", label: "K", placeholder: "7", className: "w-stat-small" },
      { field: "bb", label: "BB", placeholder: "", className: "w-stat-small" },
      { field: "h", label: "H", placeholder: "", className: "w-stat-small" },
      { field: "hr", label: "HR", placeholder: "0", className: "w-stat-small" },
      { field: "hbp", label: "HBP", placeholder: "0", className: "w-stat-small" },
      { field: "w", label: "W", placeholder: "", className: "w-stat-small" },
      { field: "l", label: "L", placeholder: "", className: "w-stat-small" },
      { field: "hld", label: "HLD", placeholder: "", className: "w-stat-small" },
      { field: "sv", label: "SV", placeholder: "2", className: "w-stat-small" },
      { field: "extraStats", label: "其他成績", placeholder: "", className: "w-extra" }
    ];

    const nameColumn = { field: "name", label: "選手", placeholder: "選手名", className: "w-name" };

    const modes = {
      prospi: {
        label: "Prospi",
        sheets: {
          hitters: makeSheet("打者", [...prospiMetadataColumns, ...hitterStatColumns]),
          pitchers: makeSheet("投手", [...prospiMetadataColumns, ...pitcherStatColumns])
        }
      },
      pawapuro: {
        label: "Pawapuro",
        sheets: {
          hitters: makeSheet("打者", [...pawapuroHitterMetadataColumns, ...hitterStatColumns]),
          pitchers: makeSheet("投手", [...pawapuroPitcherMetadataColumns, ...pitcherStatColumns])
        }
      }
    };

    const state = {
      schemaVersion: SCHEMA_VERSION,
      activeMode: modes[localStorage.getItem(ACTIVE_MODE_KEY)] ? localStorage.getItem(ACTIVE_MODE_KEY) : "pawapuro",
      activeSheet: ["hitters", "pitchers"].includes(localStorage.getItem(ACTIVE_SHEET_KEY)) ? localStorage.getItem(ACTIVE_SHEET_KEY) : "hitters"
    };
    const modeDataCache = {};
    let metadataFolded = localStorage.getItem(FOLD_STORAGE_KEY) === "true";

    function makeSheet(label, columns) {
      return {
        label,
        addLabel: `新增${label}`,
        columns: [nameColumn, ...columns],
        empty: () => normalizeByColumns([nameColumn, ...columns], {})
      };
    }

    function getSheetConfig(modeKey = state.activeMode, sheetKey = state.activeSheet) {
      return modes[modeKey].sheets[sheetKey];
    }

    function normalizeByColumns(columns, player = {}) {
      return Object.fromEntries(columns.map((column) => [column.field, String(player[column.field] ?? "")]));
    }

    function normalizePlayer(modeKey, sheetKey, player = {}) {
      const nextPlayer = { ...player };
      if (sheetKey === "pitchers" && "hp" in nextPlayer) {
        if (modeKey === "pawapuro") {
          nextPlayer.hld = nextPlayer.hld || nextPlayer.hp;
          nextPlayer.hbp = nextPlayer.hbp || "";
        } else {
          nextPlayer.hbp = nextPlayer.hbp || nextPlayer.hp;
        }
      }
      return normalizeByColumns(modes[modeKey].sheets[sheetKey].columns, nextPlayer);
    }

    function normalizeSheetData(modeKey, sheetKey, players) {
      const source = Array.isArray(players) ? players : [];
      return source.map((player) => normalizePlayer(modeKey, sheetKey, player));
    }

    function normalizeModeData(modeKey, input = {}) {
      const modeData = {
        schemaVersion: SCHEMA_VERSION,
        mode: modeKey,
        activeSheet: ["hitters", "pitchers"].includes(input.activeSheet) ? input.activeSheet : "hitters",
        sheets: {}
      };

      Object.keys(modes[modeKey].sheets).forEach((sheetKey) => {
        modeData.sheets[sheetKey] = normalizeSheetData(modeKey, sheetKey, input.sheets?.[sheetKey]);
      });

      return modeData;
    }

    async function loadModeSeed(modeKey) {
      const response = await fetch(MODE_DATA_FILES[modeKey], { cache: "no-store" });
      if (!response.ok) throw new Error(`Cannot load ${MODE_DATA_FILES[modeKey]}`);
      return normalizeModeData(modeKey, await response.json());
    }

    function loadLegacyModeData(modeKey) {
      try {
        const combined = localStorage.getItem(LEGACY_COMBINED_STORAGE_KEY);
        if (combined) {
          const parsed = JSON.parse(combined);
          const modeSheets = parsed.sheets?.[modeKey];
          if (modeSheets) {
            return normalizeModeData(modeKey, {
              activeSheet: parsed.activeMode === modeKey ? parsed.activeSheet : "hitters",
              sheets: modeSheets
            });
          }
        }
      } catch (error) {
        console.warn(error);
      }

      if (modeKey !== "prospi") return null;

      try {
        const legacySheets = {};
        Object.entries(LEGACY_PROSPI_STORAGE_KEYS).forEach(([sheetKey, storageKey]) => {
          const saved = localStorage.getItem(storageKey);
          if (saved) legacySheets[sheetKey] = JSON.parse(saved);
        });
        if (legacySheets.hitters || legacySheets.pitchers) {
          return normalizeModeData("prospi", {
            activeSheet: legacySheets.hitters ? "hitters" : "pitchers",
            sheets: legacySheets
          });
        }
      } catch (error) {
        console.warn(error);
      }

      return null;
    }

    async function loadModeData(modeKey, { forceSeed = false } = {}) {
      if (!forceSeed && modeDataCache[modeKey]) return modeDataCache[modeKey];

      if (!forceSeed) {
        try {
          const saved = localStorage.getItem(MODE_STORAGE_KEYS[modeKey]);
          if (saved) {
            modeDataCache[modeKey] = normalizeModeData(modeKey, JSON.parse(saved));
            return modeDataCache[modeKey];
          }
        } catch (error) {
          console.warn(error);
        }

        const legacyData = loadLegacyModeData(modeKey);
        if (legacyData) {
          modeDataCache[modeKey] = legacyData;
          localStorage.setItem(MODE_STORAGE_KEYS[modeKey], JSON.stringify(legacyData));
          return modeDataCache[modeKey];
        }
      }

      modeDataCache[modeKey] = await loadModeSeed(modeKey);
      return modeDataCache[modeKey];
    }

    function getActiveModeData() {
      return modeDataCache[state.activeMode];
    }

    function saveState() {
      const modeData = getActiveModeData();
      if (!modeData) return;
      modeData.activeSheet = state.activeSheet;
      localStorage.setItem(ACTIVE_MODE_KEY, state.activeMode);
      localStorage.setItem(ACTIVE_SHEET_KEY, state.activeSheet);
      localStorage.setItem(MODE_STORAGE_KEYS[state.activeMode], JSON.stringify(buildExport()));
    }

    function buildExport() {
      const modeData = getActiveModeData();
      return {
        schemaVersion: SCHEMA_VERSION,
        mode: state.activeMode,
        activeSheet: state.activeSheet,
        sheets: modeData?.sheets ?? { hitters: [], pitchers: [] }
      };
    }

    function getActivePlayers() {
      const modeData = getActiveModeData();
      modeData.sheets[state.activeSheet] ??= [];
      return modeData.sheets[state.activeSheet];
    }

    function setStatus(message) {
      statusEl.textContent = message;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        statusEl.textContent = "";
      }, 2400);
    }

    function applyMetadataFold() {
      tableWrapEl.classList.toggle("metadata-folded", metadataFolded);
      metadataButtonEl.textContent = metadataFolded ? "展開資料" : "收合資料";
      metadataButtonEl.setAttribute("aria-pressed", String(metadataFolded));
      metadataButtonEl.title = metadataFolded ? "顯示 metadata 欄位" : "隱藏 metadata 欄位";
    }

    function renderHeader() {
      headerRowEl.innerHTML = "";
      getSheetConfig().columns.forEach((column) => {
        const th = document.createElement("th");
        th.className = `${column.className}${column.metadata ? " metadata-col" : ""}`;
        th.textContent = column.label;
        headerRowEl.append(th);
      });
      const actionsTh = document.createElement("th");
      actionsTh.className = "w-actions";
      actionsTh.textContent = "操作";
      headerRowEl.append(actionsTh);
    }

    function render() {
      const sheet = getSheetConfig();
      const players = getActivePlayers();
      renderHeader();
      rowsEl.innerHTML = "";

      players.forEach((player, index) => {
        const tr = document.createElement("tr");
        sheet.columns.forEach((column) => {
          const td = document.createElement("td");
          if (column.metadata) td.className = "metadata-col";
          const input = document.createElement("input");
          input.value = player[column.field];
          input.placeholder = column.placeholder;
          input.dataset.index = index;
          input.dataset.field = column.field;
          td.append(input);
          tr.append(td);
        });

        const actionTd = document.createElement("td");
        const actions = document.createElement("div");
        actions.className = "compact-actions";
        actions.append(
          makeActionButton("↑", "上移", () => movePlayer(index, -1), index === 0),
          makeActionButton("↓", "下移", () => movePlayer(index, 1), index === players.length - 1),
          makeActionButton("+", "複製", () => duplicatePlayer(index), false),
          makeActionButton("×", "刪除", () => removePlayer(index), players.length === 1, "danger")
        );
        actionTd.append(actions);
        tr.append(actionTd);
        rowsEl.append(tr);
      });

      modeSelectEl.value = state.activeMode;
      tabButtons.forEach((button) => button.setAttribute("aria-selected", String(button.dataset.sheet === state.activeSheet)));
      addButtonEl.textContent = sheet.addLabel;
      sheetTitleEl.textContent = `${modes[state.activeMode].label} ${sheet.label}`;
      outputEl.value = JSON.stringify(buildExport(), null, 2);
      countEl.textContent = `${players.length} 位${sheet.label}`;
      tableWrapEl.style.setProperty("--table-min-width", state.activeSheet === "pitchers" ? "1840px" : "1510px");
      applyMetadataFold();
      saveState();
    }

    function makeActionButton(text, label, onClick, disabled = false, className = "") {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `icon-btn ${className}`.trim();
      button.textContent = text;
      button.title = label;
      button.setAttribute("aria-label", label);
      button.disabled = disabled;
      button.addEventListener("click", onClick);
      return button;
    }

    function addPlayer() {
      getActivePlayers().push(getSheetConfig().empty());
      render();
      rowsEl.querySelector("tr:last-child input")?.focus();
    }

    function removePlayer(index) {
      getActivePlayers().splice(index, 1);
      render();
    }

    function duplicatePlayer(index) {
      const players = getActivePlayers();
      players.splice(index + 1, 0, { ...players[index] });
      render();
    }

    function movePlayer(index, offset) {
      const players = getActivePlayers();
      const nextIndex = index + offset;
      if (nextIndex < 0 || nextIndex >= players.length) return;
      const [player] = players.splice(index, 1);
      players.splice(nextIndex, 0, player);
      render();
    }

    function switchSheet(sheetKey) {
      if (!modes[state.activeMode].sheets[sheetKey] || sheetKey === state.activeSheet) return;
      state.activeSheet = sheetKey;
      render();
    }

    async function switchMode(modeKey) {
      if (!modes[modeKey] || modeKey === state.activeMode) return;
      try {
        await loadModeData(modeKey);
        state.activeMode = modeKey;
        state.activeSheet = getActiveModeData().activeSheet;
        render();
      } catch (error) {
        console.warn(error);
        modeSelectEl.value = state.activeMode;
        setStatus(`無法載入 ${modes[modeKey].label} 資料`);
      }
    }

    async function copyOutput() {
      outputEl.value = JSON.stringify(buildExport(), null, 2);
      outputEl.select();
      try {
        await navigator.clipboard.writeText(outputEl.value);
        setStatus("已複製 JSON 到剪貼簿");
      } catch (error) {
        document.execCommand("copy");
        setStatus("已選取 JSON 並嘗試複製");
      }
    }

    function downloadOutput() {
      const blob = new Blob([JSON.stringify(buildExport(), null, 2)], { type: "application/json;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `game-stat-${state.activeMode}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
      setStatus(`已下載 game-stat-${state.activeMode}.json`);
    }

    function importJsonFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          const modeKey = modes[parsed.mode] ? parsed.mode : state.activeMode;
          modeDataCache[modeKey] = normalizeModeData(modeKey, parsed);
          state.activeMode = modeKey;
          state.activeSheet = modeDataCache[modeKey].activeSheet;
          render();
          setStatus(`已匯入 ${modes[modeKey].label} JSON`);
        } catch (error) {
          console.warn(error);
          setStatus("JSON 格式不正確");
        } finally {
          jsonFileEl.value = "";
        }
      });
      reader.readAsText(file);
    }

    rowsEl.addEventListener("input", (event) => {
      const { index, field } = event.target.dataset;
      if (index === undefined || !field) return;
      getActivePlayers()[Number(index)][field] = event.target.value;
      outputEl.value = JSON.stringify(buildExport(), null, 2);
      saveState();
    });

    tabButtons.forEach((button) => button.addEventListener("click", () => switchSheet(button.dataset.sheet)));
    modeSelectEl.addEventListener("change", () => switchMode(modeSelectEl.value));
    metadataButtonEl.addEventListener("click", () => {
      metadataFolded = !metadataFolded;
      localStorage.setItem(FOLD_STORAGE_KEY, String(metadataFolded));
      applyMetadataFold();
    });
    addButtonEl.addEventListener("click", addPlayer);
    document.querySelector("#copyJson").addEventListener("click", copyOutput);
    document.querySelector("#copyJsonSide").addEventListener("click", copyOutput);
    document.querySelector("#downloadJson").addEventListener("click", downloadOutput);
    document.querySelector("#importJson").addEventListener("click", () => jsonFileEl.click());
    jsonFileEl.addEventListener("change", () => importJsonFile(jsonFileEl.files?.[0]));
    document.querySelector("#resetSample").addEventListener("click", async () => {
      try {
        await loadModeData(state.activeMode, { forceSeed: true });
        render();
        setStatus(`已重設 ${modes[state.activeMode].label} 資料`);
      } catch (error) {
        console.warn(error);
        setStatus(`無法重設 ${modes[state.activeMode].label} 資料`);
      }
    });

    async function init() {
      try {
        await loadModeData(state.activeMode);
        state.activeSheet = getActiveModeData().activeSheet;
        render();
      } catch (error) {
        console.warn(error);
        rowsEl.innerHTML = "";
        outputEl.value = "";
        countEl.textContent = "";
        sheetTitleEl.textContent = "資料載入失敗";
        setStatus("無法載入資料檔，請用本機伺服器或 GitHub Pages 開啟");
      }
    }

    init();
  </script>
</body>
</html>
